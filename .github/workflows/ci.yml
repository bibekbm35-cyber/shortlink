name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [web, api, redirect, analytics]
    steps:
      - uses: actions/checkout@master

      - uses: docker/setup-buildx-action@master

      - name: Build image (with SBOM + provenance)
        uses: docker/build-push-action@master
        with:
          context: ./${{ matrix.service }}
          load: true
          tags: shortlink-${{ matrix.service }}:ci
          sbom: false
          provenance: false

      - name: CVE gate (fail on fixable CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shortlink-${{ matrix.service }}:ci
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"

  # Push only from main, and only if registry creds are configured as secrets.
  push:
    needs: build-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: containerization
    strategy:
      matrix:
        service: [web, api, redirect, analytics]
    steps:
      - uses: actions/checkout@master
      - uses: docker/setup-buildx-action@master
      - name: Log in to the registry
        uses: docker/login-action@master
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@master
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{secrets.REGISTRY_USER}}/${{secrets.REGISTRY}}-${{ matrix.service }}:${{ github.sha }}
            ${{secrets.REGISTRY_USER}}/${{secrets.REGISTRY}}-${{ matrix.service }}:latest
          sbom: true
          provenance: true